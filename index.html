<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/menu.css">
    <title>Kamakura Food</title>
</head>

<body class="container">
    <header class="header">
        <img class="image-logo" src="./assets/img/logo.svg" alt="restaurant logo">
        <nav>
            <a class="nav-link" href="#">Inicio</a>
            <a class="nav-link" href="#">Contacto</a>
            <button class="cart-menu" id="cart"><img src="./assets/img/cart.svg" alt=""></button>
        </nav>
    </header>
    <div class="main-container">
        <main class="menu-container">

            <!-- Los filtros se imprimirán aquí dinámicamente -->
            <section class="filters-container" id="filters"></section>

            <!-- Los platos se imprimirán aquí dinámicamente -->
            <div class="products-container" id="products"></div>

        </main>
        <aside id="cart-container">
            <div id="products-container">
                <h2>Carrito</h2>
                <div id="cart-products">
                    <h3>Añade un plato a tu menú</h3>
                </div>
                <h2 id="cart-total">Total: €</h2>
                <button class="proceedPay-button" id="proceedPay-button">Proceder al pago</button>
            </div>
            <!-- El recibo se mostrará aquí -->
            <div id="receipt-container">
                <button class="close-button" id="close-receipt">
                    <img src="./assets/img/close.svg" alt="close">
                </button>
                <h2 class="receipt-title">Recibo</h2>
                <div id="receipt-product"></div>
                <h3 id="receipt-total">Total: €</h3>
                <button class="pay-button" id="pay-button">Pagar</button>
            </div>
        </aside>
    </div>
   <!-- TAREA 7 — Modal de confirmación de pago -->
    <!-- Vive fuera del aside para cubrir TODA la pantalla -->
    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h2>¡Pedido confirmado! 🎉</h2>
            <p>Tu pedido ha sido enviado a cocina.</p>
            <p>Gracias por elegir <strong>Kamakura Food</strong>.</p>
            <button id="close-modal" class="close-modal-button">Cerrar</button>
        </div>
    </div>
    <!-- Punto de entrada principal — type="module" activa los ESModules -->
    <script type="module" src="./src/events.js"></script>
</body>

</html>
